name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  # Required for trusted publishing to crates.io
  id-token: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -p words-to-data -- --check

      - name: Run clippy
        run: cargo clippy -p words-to-data --all-targets --all-features -- -D warnings

      - name: Build (Rust only)
        run: cargo build -p words-to-data --lib --verbose

      - name: Unzip test files
        run: cd tests/test_data && tar xvf test_files.tar.xz

      - name: Run Rust tests
        run: cargo test -p words-to-data --verbose

      - name: Build with Python feature
        run: cargo build -p words-to-data --lib --features python --verbose

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write     # Required for OIDC token exchange
    steps:
      - uses: actions/checkout@v4
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
        
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify package can be published
        run: cargo publish -p words-to-data --dry-run

      - name: Publish to crates.io
        run: cargo publish -p words-to-data
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
